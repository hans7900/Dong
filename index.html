<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안녕 마음이!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Myeongjo:wght@700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#fff;font-family:'Gowun Dodum',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.stars-wrap{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;animation:float-star linear infinite;opacity:0}
@keyframes float-star{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:.4}90%{opacity:.2}100%{transform:translateY(-120vh) rotate(360deg);opacity:0}}
.page{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
#scene-wrap{position:relative;width:min(320px,80vw);aspect-ratio:1111/1416;animation:fade-up 1s ease .2s both;}
@keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}
.hitbox{position:absolute;border-radius:50%;cursor:pointer;z-index:20;background:transparent;border:none;padding:0;}
#heart-hitbox{left:52.1%;top:59.3%;transform:translate(-50%,-50%);width:14%;height:10%;}
#hand-hitbox{ left:14.4%;top:47.0%;transform:translate(-50%,-50%);width:18%;height:14%;}
#rhand-hitbox{left:88.9%;top:73.4%;transform:translate(-50%,-50%);width:14%;height:12%;}
#head-hitbox{ left:49.5%;top:18.6%;transform:translate(-50%,-50%);width:52%;height:28%;cursor:default;}
.glow{position:absolute;border-radius:50%;pointer-events:none;z-index:15;}
#heart-glow{left:52.1%;top:59.3%;transform:translate(-50%,-50%);width:14%;height:10%;animation:g1 2.6s ease-in-out infinite;}
#hand-glow{ left:14.4%;top:47.0%;transform:translate(-50%,-50%);width:18%;height:14%;animation:g2 2.8s ease-in-out .4s infinite;}
#rhand-glow{left:88.9%;top:73.4%;transform:translate(-50%,-50%);width:14%;height:12%;animation:g3 2.7s ease-in-out .8s infinite;}
@keyframes g1{0%,100%{box-shadow:0 0 6px 3px rgba(100,170,255,.3)}50%{box-shadow:0 0 22px 10px rgba(100,170,255,.7)}}
@keyframes g2{0%,100%{box-shadow:0 0 5px 2px rgba(255,200,100,.2)}50%{box-shadow:0 0 18px 8px rgba(255,200,100,.5)}}
@keyframes g3{0%,100%{box-shadow:0 0 5px 2px rgba(255,140,180,.2)}50%{box-shadow:0 0 18px 8px rgba(255,140,180,.55)}}
.ripple{position:absolute;border-radius:50%;border:2px solid rgba(100,180,240,.7);pointer-events:none;z-index:16;opacity:0;}
#hr1,#hr2{left:52.1%;top:59.3%;transform:translate(-50%,-50%);width:14%;height:10%;}
#wr1,#wr2{left:14.4%;top:47.0%;transform:translate(-50%,-50%);width:18%;height:14%;border-color:rgba(255,185,80,.7);}
#rr1,#rr2{left:88.9%;top:73.4%;transform:translate(-50%,-50%);width:14%;height:12%;border-color:rgba(255,140,180,.7);}
#hr3,#hr4{left:49.5%;top:18.6%;transform:translate(-50%,-50%);width:52%;height:28%;border-color:rgba(200,160,255,.6);}
.ripple.go{animation:rout .9s ease-out forwards}
.ripple.go2{animation:rout .9s ease-out .2s forwards}
@keyframes rout{from{transform:translate(-50%,-50%) scale(1);opacity:.8}to{transform:translate(-50%,-50%) scale(1.7);opacity:0}}
.bubble{position:absolute;top:-12%;left:50%;transform:translateX(-50%) translateY(-6px);background:white;border:1.5px solid #91c9ef;color:#3a3028;padding:10px 20px;border-radius:22px;font-size:14px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .28s ease,transform .28s ease;box-shadow:0 4px 20px rgba(145,201,239,.28);z-index:30;}
.bubble::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:white;}
.bubble.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fly{position:fixed;pointer-events:none;z-index:999;font-size:20px;animation:fly-up 1.1s ease-out forwards}
@keyframes fly-up{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(.3);opacity:0}}
.hpart{position:fixed;pointer-events:none;z-index:999;font-size:18px;animation:hpf 1.2s ease-out forwards;}
@keyframes hpf{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(.2);opacity:0}}
.hint{margin-top:1rem;font-size:12px;color:#c0b8b0;letter-spacing:.1em;display:flex;align-items:center;gap:6px;}
.dot{width:5px;height:5px;border-radius:50%;background:#b8d8f0;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
#st{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:12px;color:#c0b8b0;z-index:100;transition:opacity .5s;}
.corner{position:fixed;font-size:11px;color:#ddd8d0;letter-spacing:.1em}
.corner.tl{top:1.4rem;left:1.4rem}.corner.tr{top:1.4rem;right:1.4rem}
</style>
</head>
<body>
<div class="stars-wrap" id="sw"></div>
<div class="corner tl">✦ 마음이</div>
<div class="corner tr">Interactive ✦</div>
<div id="st">하트 · 손 · 머리를 눌러보세요 💙</div>
<div class="page">
  <div id="scene-wrap">
    <canvas id="cv"></canvas>
    <div class="glow" id="heart-glow"></div>
    <div class="glow" id="hand-glow"></div>
    <div class="glow" id="rhand-glow"></div>
    <div class="ripple" id="hr1"></div><div class="ripple" id="hr2"></div>
    <div class="ripple" id="wr1"></div><div class="ripple" id="wr2"></div>
    <div class="ripple" id="rr1"></div><div class="ripple" id="rr2"></div>
    <div class="ripple" id="hr3"></div><div class="ripple" id="hr4"></div>
    <button class="hitbox" id="heart-hitbox" aria-label="하트"></button>
    <button class="hitbox" id="hand-hitbox"  aria-label="왼손"></button>
    <button class="hitbox" id="rhand-hitbox" aria-label="오른손"></button>
    <button class="hitbox" id="head-hitbox"  aria-label="머리"></button>
    <div class="bubble" id="hb1">오늘 기분은 어떠신가요? 🌸</div>
    <div class="bubble" id="hb2" style="border-color:#f7c87a">같이 놀아요! 🎉</div>
    <div class="bubble" id="hb3" style="border-color:#ffb0c8">안아줄게요! 🤗</div>
    <div class="bubble" id="hb4" style="border-color:#d4b4f4">쓰다듬어줘서 고마워요 💜</div>
  </div>
  <p class="hint"><span class="dot"></span>하트 · 왼손 · 오른손 · 머리를 눌러보세요<span class="dot"></span></p>
</div>

    bufs = await Promise.all(srcs.map(async(b64)=>{
      const bin=atob(b64);
      const arr=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);

  }catch(e){
    stEl.textContent='⚠️ 오디오 오류: '+e.message;

function play(idx){
  if(!loaded||!bufs[idx]) return;
  if(currentSrc){
    currentSrc.onended=null;
    try{currentSrc.stop();}catch(e){}
    currentSrc=null;
  }
  const src=actx.createBufferSource();
  currentSrc=src;
  src.buffer=bufs[idx];
  src.connect(actx.destination);
  src.start(0);
  stEl.style.opacity='1'; stEl.textContent='🎵 재생 중...';
  src.onended=()=>{
    if(currentSrc===src){
      currentSrc=null;
      stEl.textContent='💙';
      setTimeout(()=>stEl.style.opacity='0',1500);
    }
  };
}

/* 첫 클릭에 로드 */
document.addEventListener('click',()=>loadAll(),{once:true});
document.addEventListener('touchstart',()=>loadAll(),{once:true});

/* ── Helpers ── */
function ripple(r1,r2){
  r1.classList.remove('go');r2.classList.remove('go2');void r1.offsetWidth;
  r1.classList.add('go');r2.classList.add('go2');
  setTimeout(()=>{r1.classList.remove('go');r2.classList.remove('go2');},1100);
}
function bubble(el){
  ['hb1','hb2','hb3','hb4'].forEach(id=>document.getElementById(id).classList.remove('show'));
  el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),4500);
}
function fly(x,y,em){
  for(let i=0;i<8;i++){
    const e=document.createElement('span');e.className='fly';e.textContent=em[Math.floor(Math.random()*em.length)];
    const ang=(Math.random()*200-100)-90,rad=ang*Math.PI/180,d=70+Math.random()*110;
    e.style.left=x+'px';e.style.top=y+'px';
    e.style.setProperty('--tx',(Math.cos(rad)*d)+'px');e.style.setProperty('--ty',(Math.sin(rad)*d)+'px');
    e.style.animationDelay=(Math.random()*.15)+'s';
    document.body.appendChild(e);setTimeout(()=>e.remove(),1300);
  }
}

/* ── 하트 ── */
document.getElementById('heart-hitbox').addEventListener('click',()=>{
  loadAll().then(()=>play(0));
  ripple(document.getElementById('hr1'),document.getElementById('hr2'));
  const r=document.getElementById('heart-hitbox').getBoundingClientRect();
  fly(r.left+r.width/2,r.top+r.height/2,['💙','🩵','💫','✨','🌸','⭐','🤍']);
  bubble(document.getElementById('hb1'));
});

/* ── 왼손 ── */
document.getElementById('hand-hitbox').addEventListener('click',()=>{
  loadAll().then(()=>play(1));
  ripple(document.getElementById('wr1'),document.getElementById('wr2'));
  const r=document.getElementById('hand-hitbox').getBoundingClientRect();
  fly(r.left+r.width/2,r.top+r.height/2,['👋','🌟','✨','😊','🎉','💛','🌈']);
  bubble(document.getElementById('hb2'));
});

/* ── 오른손 ── */
document.getElementById('rhand-hitbox').addEventListener('click',()=>{
  loadAll().then(()=>play(3));
  ripple(document.getElementById('rr1'),document.getElementById('rr2'));
  const r=document.getElementById('rhand-hitbox').getBoundingClientRect();
  fly(r.left+r.width/2,r.top+r.height/2,['🤗','💕','🌸','✨','💖','🥰','💝']);
  bubble(document.getElementById('hb3'));
});

/* ── 머리 쓰다듬기 ── */
const headBtn=document.getElementById('head-hitbox');
let stroking=false, strokeCount=0;
function strokeStart(){stroking=true;strokeCount=0;}
function strokeMove(e){
  if(!stroking) return;
  strokeCount++;
  const t=e.touches?.[0]||e;
  const p=document.createElement('span');p.className='hpart';
  p.textContent=['✨','💜','🌟','💫','⭐','🩵','💕'][Math.floor(Math.random()*7)];
  p.style.left=t.clientX+'px';p.style.top=t.clientY+'px';
  p.style.setProperty('--tx',(Math.random()-0.5)*80+'px');
  p.style.setProperty('--ty',(-60-Math.random()*60)+'px');
  document.body.appendChild(p);setTimeout(()=>p.remove(),1200);
  if(strokeCount===10){
    loadAll().then(()=>play(2));
    ripple(document.getElementById('hr3'),document.getElementById('hr4'));
    bubble(document.getElementById('hb4'));
  }
}
function strokeEnd(){stroking=false;strokeCount=0;}
headBtn.addEventListener('mousedown',strokeStart);
headBtn.addEventListener('mousemove',strokeMove);
headBtn.addEventListener('mouseup',strokeEnd);
headBtn.addEventListener('mouseleave',strokeEnd);
headBtn.addEventListener('touchstart',strokeStart,{passive:true});
headBtn.addEventListener('touchmove',strokeMove,{passive:true});
headBtn.addEventListener('touchend',strokeEnd);
</script>
